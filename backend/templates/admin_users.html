<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Users</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body>
  <header class="admin-header">
    <h1>Registered Users</h1>
    <div class="admin-actions">
      <a class="btn btn-secondary" href="/admin">Back Dashboard</a>
      <a class="btn" href="/admin/logout">Logout</a>
    </div>
  </header>
  <main class="container">
    <section class="card">
      <h2>Total Users: {{ users | length }}</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>ID</th><th>Name</th><th>Email</th><th>Created</th></tr>
          </thead>
          <tbody>
            {% for u in users %}
            <tr><td>{{ u.id }}</td><td>{{ u.name }}</td><td>{{ u.email }}</td><td>{{ u.created_at }}</td></tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>
