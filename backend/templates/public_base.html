<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or 'AI Endocrine Risk Analysis' }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body>
  <div class="bg-mesh">
    <span class="mesh mesh-a"></span>
    <span class="mesh mesh-b"></span>
    <span class="mesh mesh-c"></span>
  </div>

  <header class="nav">
    <div class="container nav-inner">
      <a class="logo" href="{{ url_for('public.index') }}">Endocrine<span>AI</span></a>
      <nav class="nav-links">
        <a href="{{ url_for('public.index') }}">Home</a>
        <a href="{{ url_for('public.about') }}">About</a>
        <a href="{{ url_for('public.methodology') }}">Methodology</a>
        <a href="{{ url_for('public.contact') }}">Contact</a>
        {% if is_user_logged_in %}
          <a href="/dashboard">Dashboard</a>
          <a href="/logout">Logout ({{ user_name }})</a>
        {% else %}
          <a href="/login">Login</a>
          <a href="/signup">Signup</a>
        {% endif %}
        <a class="btn btn-ghost" href="/admin/login">Admin</a>
      </nav>
      <button class="nav-toggle" aria-label="Toggle menu">☰</button>
    </div>
  </header>

  {% block content %}{% endblock %}

  <footer class="footer">
    <div class="container footer-inner">
      <div>
        <h4>AI-Driven Endocrine Risk Analysis</h4>
        <p class="muted">Preventive screening support. Not a medical diagnosis.</p>
      </div>
      <div class="footer-links">
        <a href="/about">About</a>
        <a href="/methodology">Methodology</a>
        <a href="/contact">Contact</a>
      </div>
    </div>
  </footer>

  <script>
    const toggle = document.querySelector('.nav-toggle');
    const links = document.querySelector('.nav-links');
    if (toggle && links) {
      toggle.addEventListener('click', () => links.classList.toggle('open'));
    }
  </script>
</body>
</html>
