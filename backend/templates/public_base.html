<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or 'AI Endocrine Risk Analysis' }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body>
  <div class="bg-decor">
    <span class="orb orb-a"></span>
    <span class="orb orb-b"></span>
    <span class="grid"></span>
  </div>

  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="{{ url_for('public.index') }}">Endocrine AI</a>
      <nav class="top-nav">
        <a href="{{ url_for('public.index') }}">Home</a>
        <a href="{{ url_for('public.about') }}">About</a>
        <a href="{{ url_for('public.methodology') }}">Methodology</a>
        <a href="{{ url_for('public.contact') }}">Contact</a>
        {% if is_user_logged_in %}
          <a href="/dashboard">My Dashboard</a>
          <a href="/logout">Logout ({{ user_name }})</a>
        {% else %}
          <a href="/login">Login</a>
          <a href="/signup">Signup</a>
        {% endif %}
        <a class="btn btn-small btn-secondary" href="/admin/login">Admin</a>
      </nav>
    </div>
  </header>

  {% block content %}{% endblock %}

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>AI-Driven Endocrine Risk Analysis System</p>
      <p class="muted">Preventive screening support. Not a medical diagnosis.</p>
    </div>
  </footer>
</body>
</html>
